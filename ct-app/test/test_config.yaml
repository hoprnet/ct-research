# =============================================================================
environment: test

flags:
  node: 
    outgoing_channels_balances: 30s
    
    healthcheck: 10s
    retrieve_peers: 30s
    refresh_balances: Off
    refresh_redeemed: Off
    relay_messages: Off
    retrieve_balances: 30s
    
    observe_message_queue: On
    maintain_sessions: 10s

  peer:
    message_relay_request: Off

# =============================================================================
# 
# =============================================================================
economic_model:
  legacy:
    proportion: 0.9
    apr: 12.0

    coefficients:
      a: 1
      b: 2
      upperbound: "3 wxHOPR"
      lowerbound: "0.000001 wxHOPR"

  sigmoid:
    proportion: 0.1
    max_apr: 15
    network_capacity: 2000
    total_token_supply: "450000000 wxHOPR"

    offset: -0.9
    buckets:
      economic_security:
        flatness: 1.8
        skewness: 1.52
        upperbound: 0.4
        offset: 3.14

      network_capacity:
        flatness: 2.97
        skewness: 0.72
        upperbound: 1.0
        offset: 4.08
        
# =============================================================================
# 
# =============================================================================
peer:
  minimum_delay_between_batches: 2s
  sleep_mean_time: 30s
  sleep_std_time: 2s
  excluded_peers: []

# =============================================================================
# 
# =============================================================================
channel:
  min_balance: "0.05 wxHOPR"
  funding_amount: "0.2 wxHOPR"
  max_age: 1m
  
# =============================================================================
#
# =============================================================================
sessions:
  green_destinations: []
  blue_destinations: []
  session_retry_base_delay: 2s
  session_retry_max_delay: 60s
  message_worker_count: 10
  message_queue_maxsize: 10000

